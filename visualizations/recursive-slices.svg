<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Recursive slices</title>
  <desc id="desc">Animated tree showing BMSSP recursive decomposition into smaller bounded slices.</desc>
  <style>
    .label { font: 600 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
    .sub { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.3; rx: 9; }
    .hot { fill: #e0f2fe; stroke: #0284c7; }
  </style>
  <rect width="920" height="300" fill="#fff"/>
  <text class="label" x="34" y="36">Recursive slices</text>
  <text class="sub" x="34" y="58">The parent call delegates bounded slices to smaller BMSSP calls.</text>

  <path class="line" d="M455 90 L260 155"/>
  <path class="line" d="M455 90 L455 155"/>
  <path class="line" d="M455 90 L650 155"/>
  <path class="line" d="M260 200 L190 245"/>
  <path class="line" d="M260 200 L330 245"/>
  <path class="line" d="M650 200 L580 245"/>
  <path class="line" d="M650 200 L720 245"/>

  <rect class="box hot" x="365" y="65" width="180" height="50"/>
  <text class="label" x="397" y="95">BMSSP(l, B, S)</text>

  <rect class="box" x="170" y="150" width="180" height="50"/>
  <text class="label" x="196" y="180">slice 1: l - 1</text>
  <rect class="box" x="365" y="150" width="180" height="50"/>
  <text class="label" x="391" y="180">slice 2: l - 1</text>
  <rect class="box" x="560" y="150" width="180" height="50"/>
  <text class="label" x="586" y="180">slice 3: l - 1</text>

  <rect class="box" x="125" y="230" width="130" height="40"/>
  <text class="sub" x="156" y="255">base case</text>
  <rect class="box" x="285" y="230" width="130" height="40"/>
  <text class="sub" x="316" y="255">base case</text>
  <rect class="box" x="515" y="230" width="130" height="40"/>
  <text class="sub" x="546" y="255">base case</text>
  <rect class="box" x="675" y="230" width="130" height="40"/>
  <text class="sub" x="706" y="255">base case</text>

  <rect class="box hot" x="365" y="150" width="180" height="50">
    <animate attributeName="opacity" values=".35;1;.35" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <text class="sub" x="365" y="285">Only one slice is shown as active; the others are controlled by queue pulls and boundaries.</text>
</svg>
